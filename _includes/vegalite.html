<!-- Vega-Lite Rendering Support -->
<script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

<style>
  .vega-embed {
    width: 100%;
    margin: 1rem 0;
  }
  .vega-embed .vega-actions {
    padding-top: 0.5rem;
  }
  .vega-embed .vega-actions a {
    margin-right: 0.75rem;
    font-size: 0.75rem;
  }
  .vega-chart-container {
    overflow-x: auto;
  }
</style>

<script>
(function() {
  function renderVegaLiteCharts() {
    var vegaBlocks = [];

    // Method 1: Find by wrapper div class (Jekyll/Rouge style)
    // Jekyll generates: div.language-vega-lite.highlighter-rouge > div.highlight > pre > code
    document.querySelectorAll('.language-vega-lite, .language-vegalite').forEach(function(wrapper) {
      var code = wrapper.querySelector('code');
      if (code) {
        vegaBlocks.push({ code: code, wrapper: wrapper });
      }
    });

    // Method 2: Find by code element class
    document.querySelectorAll('code.language-vega-lite, code.language-vegalite').forEach(function(code) {
      var alreadyAdded = vegaBlocks.some(function(block) { return block.code === code; });
      if (!alreadyAdded) {
        var wrapper = code.closest('.highlighter-rouge') || code.closest('.highlight') || code.parentElement;
        vegaBlocks.push({ code: code, wrapper: wrapper });
      }
    });

    // Method 3: Find by highlighter-rouge class containing vega
    document.querySelectorAll('[class*="highlighter-rouge"][class*="vega"]').forEach(function(wrapper) {
      var code = wrapper.querySelector('code');
      if (code) {
        var alreadyAdded = vegaBlocks.some(function(block) { return block.code === code; });
        if (!alreadyAdded) {
          vegaBlocks.push({ code: code, wrapper: wrapper });
        }
      }
    });

    // Method 4: Fallback - find ALL code blocks and check if content is Vega-Lite JSON
    if (vegaBlocks.length === 0) {
      document.querySelectorAll('pre code, .highlight code').forEach(function(code) {
        var text = code.textContent.trim();
        // Check if it looks like Vega-Lite JSON (has $schema with vega)
        if (text.startsWith('{') && text.indexOf('"$schema"') !== -1 && text.indexOf('vega') !== -1) {
          try {
            var parsed = JSON.parse(text);
            if (parsed.$schema && parsed.$schema.indexOf('vega') !== -1) {
              var wrapper = code.closest('.highlighter-rouge') || code.closest('.highlight') || code.parentElement;
              vegaBlocks.push({ code: code, wrapper: wrapper });
            }
          } catch (e) {
            // Not valid JSON, skip
          }
        }
      });
    }

    console.log('Vega-Lite: Found ' + vegaBlocks.length + ' chart(s) to render');

    vegaBlocks.forEach(function(block, index) {
      try {
        var specText = block.code.textContent.trim();
        var spec = JSON.parse(specText);

        // Create container for the chart
        var container = document.createElement('div');
        container.id = 'vega-chart-' + index;
        container.className = 'vega-chart-container';

        // Insert container before the wrapper and hide the code block
        block.wrapper.parentNode.insertBefore(container, block.wrapper);
        block.wrapper.style.display = 'none';

        // Render the chart with theme detection for just-the-docs
        var isDark = false;
        try {
          isDark = document.documentElement.dataset.theme === 'dark' ||
                   (typeof jtd !== 'undefined' && jtd.getTheme && jtd.getTheme() === 'dark') ||
                   window.matchMedia('(prefers-color-scheme: dark)').matches;
        } catch (e) {}

        vegaEmbed('#' + container.id, spec, {
          theme: isDark ? 'dark' : undefined,
          actions: {
            export: true,
            source: false,
            compiled: false,
            editor: true
          }
        }).then(function(result) {
          console.log('Vega-Lite: Chart ' + index + ' rendered successfully');
        }).catch(function(error) {
          console.error('Vega-Lite rendering error for chart ' + index + ':', error);
          block.wrapper.style.display = 'block';
          container.innerHTML = '<p style="color: red; padding: 1rem; background: #fee; border-radius: 4px;">Error rendering chart: ' + error.message + '</p>';
        });
      } catch (e) {
        console.error('Vega-Lite JSON parse error for chart ' + index + ':', e);
      }
    });
  }

  // Run when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', renderVegaLiteCharts);
  } else {
    // DOM already loaded (script loaded async/defer)
    renderVegaLiteCharts();
  }
})();
</script>
